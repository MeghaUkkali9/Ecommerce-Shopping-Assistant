apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-assistant
  labels:
    app: shopping-assistant
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopping-assistant
  template:
    metadata:
      labels:
        app: shopping-assistant
    spec:
      containers:
      - name: shopping-assistant
        image: 718203020368.dkr.ecr.ap-southeast-2.amazonaws.com/shopping-assistant:latest
        ports:
        - containerPort: 8000
        env:                              
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: shopping-assistant-secrets
              key: OPENAI_API_KEY
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: shopping-assistant-secrets
              key: GROQ_API_KEY
        - name: ASTRA_DB_API_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: shopping-assistant-secrets
              key: ASTRA_DB_API_ENDPOINT
        - name: ASTRA_DB_APPLICATION_TOKEN
          valueFrom:
            secretKeyRef:
              name: shopping-assistant-secrets
              key: ASTRA_DB_APPLICATION_TOKEN
        - name: ASTRA_DB_KEYSPACE
          valueFrom:
            secretKeyRef:
              name: shopping-assistant-secrets
              key: ASTRA_DB_KEYSPACE