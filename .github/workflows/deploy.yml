name: Deploy App to EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Check if EKS Cluster exists
      - name: Check if EKS Cluster exists
        run: |
          if ! aws eks describe-cluster --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}; then
            echo "EKS Cluster not found! Run infra.yml workflow first."
            exit 1
          fi

      # Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
      - name: Debug workspace
        run: |
          pwd
          ls -la
      - name: Debug variables
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          echo "REGISTRY=$REGISTRY"
          echo "REPOSITORY=$REPOSITORY"
          echo "IMAGE_TAG=$IMAGE_TAG"

      # Build, tag and push Docker image to ECR
      - name: Build and Push Docker image
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          IMAGE_URI=$REGISTRY/$REPOSITORY:$IMAGE_TAG

          echo "IMAGE_URI=$IMAGE_URI"

          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

          docker tag $IMAGE_URI $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:latest

      # Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      # Ensure AWS CLI is installed
      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version
    
      - name: Print Env Vars
        run: |
          echo "Region: ${{ secrets.AWS_REGION }}"
          echo "Cluster: ${{ secrets.EKS_CLUSTER_NAME }}"  
      
      # Update kubeconfig
      - name: Update kubeconfig with debug
        run: |
          aws eks update-kubeconfig \
            --name $EKS_CLUSTER_NAME \
            --region $AWS_REGION \
            --debug
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

      # Debug: Show kubeconfig file
      - name: Show kubeconfig
        run: |
          ls -la ~/.kube || true
          cat ~/.kube/config || true
      
      # Create/Update Kubernetes Secret (for API keys)
      - name: Create Kubernetes secret for API keys
        run: |
          kubectl create secret generic shopping-assistant-secrets \
            --from-literal=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --from-literal=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --from-literal=ASTRA_DB_API_ENDPOINT=${{ secrets.ASTRA_DB_API_ENDPOINT }} \
            --from-literal=ASTRA_DB_APPLICATION_TOKEN=${{ secrets.ASTRA_DB_APPLICATION_TOKEN }} \
            --from-literal=ASTRA_DB_KEYSPACE=${{ secrets.ASTRA_DB_KEYSPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # Deploy manifests
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8/deployment.yml
          kubectl apply -f k8/service.yml

      - name: Patch deployment with new image tag
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          kubectl set image deployment/shopping-assistant shopping-assistant=$REGISTRY/$REPOSITORY:$IMAGE_TAG


      # Verify rollout
      - name: Verify Deployment
        run: |
          set -e
          if ! kubectl rollout status deployment/shopping-assistant --timeout=120s; then
            echo "Rollout failed, collecting debug info..."
            kubectl describe deployment shopping-assistant || true
            kubectl get pods -o wide || true
            for pod in $(kubectl get pods -l app=shopping-assistant -o jsonpath='{.items[*].metadata.name}'); do
              echo "--- Logs for pod: $pod ---"
              kubectl logs $pod --all-containers --tail=100 || true
            done
            exit 1
          fi

      # Show Service details
      - name: Get Service Info
        run: kubectl get svc shopping-assistant-service -o wide